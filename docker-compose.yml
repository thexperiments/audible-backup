services:
  audible-backup:
    image: ghcr.io/thexperiments/audible-backup:main
    restart: unless-stopped
    volumes:
      # audible-cli auth config — created once via `audible quickstart`
      # run `audible activation-bytes` once to store activation bytes in the config
      - /mnt/tank/audible/config:/root/.audible
      # raw downloaded AAX/AAXC files
      - /mnt/tank/audible/raw:/output/raw
      # final converted M4B files
      - /mnt/tank/audible/converted:/output/converted
    environment:
      DOWNLOAD_DIR: /output/raw
      OUTPUT_DIR: /output/converted
      # Cron schedule — remove or leave empty to run once and exit.
      # Examples:
      #   "0 2 * * 0"   every Sunday at 2am
      #   "0 3 * * *"   every day at 3am
      SCHEDULE: "0 2 * * 0"
